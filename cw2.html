!DOCTYPE html>
<html>
<head>
    <style>
        /* tag selector */
        p {
            color: blue;
        }

        /* class selector */
        .myClass {
            color: green;
        }

        /* id selector */
        #myId {
            color: red;
        }
    </style>
</head>
<body>

    <p class="myClass" id="myId">
        ეს არის პარაგრაფი
    </p>

</body>
</html>
საბოლოოდ ტექსტი იქნება წითელი, რადგან:

 ID selector-ს აქვს ყველაზე მაღალი პრიორიტეტი

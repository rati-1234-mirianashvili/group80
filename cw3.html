<!DOCTYPE html>
<html>
<head>
    <style>
        .box {
            width: 400px;
            height: 400px;
            background-color: lightgray;
        }

        .inner {
            width: 25%;   /* მშობელი div-ის სიგანის 1/4 */
            height: 25%;  /* მშობელი div-ის სიმაღლის 1/4 */
            background-color: orange;
        }
    </style>
</head>
<body>

    <div class="box">
        <p class="inner">
            ეს პარაგრაფი არის div-ის ზომის მეოთხედი
        </p>
    </div>

</body>
</html>

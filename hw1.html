<style>
    /* 1) Arial ფონტი */
    .text {
        font-family: Arial, sans-serif;
        font-size: 24px;
    }

    /* 2) ღილაკი hover ეფექტით */
    .btn {
        background-color: blue;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background-color: red;
    }

    /* 3) კვადრატი ზომის შეცვლით */
    .box {
        width: 100px;
        height: 100px;
        background-color: green;
        transition: 0.5s;
        margin-top: 20px;
    }

    .box:hover {
        width: 300px;
        height: 300px;
    }

    /* 4) ლინკი */
    a:link {
        color: green;
    }
</style>
</head>

<body>

    <!-- 1 -->
    <p class="text">ეს არის Arial ფონტი</p>

    <!-- 2 -->
    <button class="btn">დააჭირე</button>

    <!-- 3 -->
    <div class="box"></div>

    <!-- 4 -->
    <br><br>
    <a href="https://facebook.com" target="_blank">
        Facebook პროფილი
    </a>

</body>
</html>

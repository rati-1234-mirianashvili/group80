<!DOCTYPE html>
<html>
<head>
    <title>Restaurant</title>

    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial;
        }

        /* 1) შუაში პარაგრაფი */
        .center-text {
            color: red;
            font-size: 22px;
            text-align: center;
        }

        /* 2) მარჯვენა დიდი სათაური */
        .right-title {
            color: blue;
            background-color: yellow;
            text-align: right;
            font-size: 40px;
            border: 2px solid black;
        }

        /* 3) h2 სტილი */
        h2 {
            background-color: green;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* 4) სიის სტილები */
        .item1 {
            color: red;
            font-size: 18px;
        }

        .item2 {
            background-color: yellow;
            border: 2px dotted skyblue;
        }

        .item3 {
            color: blue;
            text-align: center;
        }

        /* დამატებითი დიზაინი */
        .menu {
            width: 50%;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: darkred;
            color: white;
            border: none;
            border-radius: 5px;
        }

    </style>
</head>

<body>

    <!-- 2) დიდი სათაური -->
    <h1 class="right-title">🍴 Delicious Restaurant</h1>

    <!-- 3) h2 -->
    <h2>ჩვენი მენიუ</h2>

    <!-- 1) პარაგრაფი -->
    <p class="center-text">
        საუკეთესო გემო და ხარისხი ერთ ადგილზე!
    </p>

    <div class="menu">

        <!-- 4) სია -->
        <ol>
            <li class="item1">პიცა</li>
            <li class="item2">ბურგერი</li>
            <li class="item3">პასტა</li>
        </ol>

    </div>

    <button>დაჯავშნა</button>

</body>
</html>
